<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>LawFlow AI</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ivyfmm/lawflow-optimized@main/assets/index-B-SYtpNS.css"></head><body class="bg-gray-50"><div class="max-w-7xl mx-auto px-4 py-8"><h1 class="text-2xl font-bold text-gray-900">LawFlow AI - 制裁扫描</h1><div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200 mt-6"><div class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">目标国家</label><select id="scan-country" class="w-full p-3 border-2 border-gray-200 rounded-lg"><option value="">选择国家...</option><option value="RU">俄罗斯</option><option value="IR">伊朗</option><option value="KP">朝鲜</option><option value="SY">叙利亚</option><option value="CN">中国</option><option value="US">美国</option><option value="BY">白俄罗斯</option><option value="VE">委内瑞拉</option><option value="CU">古巴</option><option value="MM">缅甸</option><option value="AF">阿富汗</option></select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">产品类别</label><input type="text" id="scan-product" class="w-full p-3 border-2 border-gray-200 rounded-lg" placeholder="如：芯片、无人机..."></div><div><label class="block text-sm font-medium text-gray-700 mb-1">交易对手</label><input type="text" id="scan-entity" class="w-full p-3 border-2 border-gray-200 rounded-lg" placeholder="输入公司名..."></div><button id="btn-scan" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold cursor-pointer">开始扫描</button></div></div><div id="scan-result" class="bg-gray-50 rounded-xl p-6 mt-6" style="display:none"><h3 class="font-bold text-lg mb-4">扫描报告</h3><div id="scan-details"></div></div><div id="scan-placeholder" style="display:flex;align-items:center;justify-content:center;height:200px;background:#f3f4f6;border-radius:12px;color:#9ca3af;margin-top:24px">选择参数并点击「开始扫描」查看结果</div></div><script src="https://cdn.jsdelivr.net/gh/ivyfmm/lawflow-optimized@main/sanction-scanner-enhanced.js"></script><script src="https://cdn.jsdelivr.net/gh/ivyfmm/lawflow-optimized@main/law-shield-enhanced.js"></script><script>document.getElementById('btn-scan').addEventListener('click',()=>{const country=document.getElementById('scan-country').value;if(!country){alert('请选择目标国家');return}const report=window.LawFlowSanctionEnhanced.generateSanctionReport(country,document.getElementById('scan-product').value,document.getElementById('scan-entity').value,[]);const result=document.getElementById('scan-result');result.style.display='block';document.getElementById('scan-placeholder').style.display='none';document.getElementById('scan-details').innerHTML=`<pre style="background:#1f2937;color:#f3f4f6;padding:16px;border-radius:8px;overflow:auto;font-size:12px">${JSON.stringify(report,null,2)}</pre>`;});</script></body></html>
